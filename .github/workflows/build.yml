name: Build
run-name: "${{ contains(github.ref, 'refs/tags/') && 'Release' || 'Build' }} (${{ github.run_number }})"

on:
  push:
    tags:
      - "*"
  workflow_dispatch:

env:
  WORKSPACE: ${{ github.workspace }}
  DEVELOPER_DIR: /Applications/Xcode_26.4.app/Contents/Developer
  BUILD_NUMBER: 3730
  YEAR: 2026
  FORK_BUILD_NAME: l

jobs:
  source-code:
    name: Check out and process source code
    if: "!contains(github.ref, 'refs/tags/') || github.repository == 'TRAGsoft/solar2d'"
    runs-on: macos-26
    steps:
      - run: CDR="$(basename "$(pwd)")" ; cd .. ; rm -rf "$CDR" ; mkdir -p "$CDR" ; cd "$CDR"
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - run: ./tools/GHAction/daily_env.sh
      - name: Set daily build
        run: ./tools/GHAction/process_sources.sh
      - name: Upload Source bundle
        uses: actions/upload-artifact@v4
        with:
          name: SourceCode
          path: ./output

  native:
    needs:
      - source-code
    runs-on: macos-26
    steps:
      - run: CDR="$(basename "$(pwd)")" ; cd .. ; rm -rf "$CDR" ; mkdir -p "$CDR" ; cd "$CDR"
      - name: Get processed code
        uses: actions/download-artifact@v4
        with:
          name: SourceCode
          path: SourceCode
      - name: Unpack source code
        run: tar -xzf SourceCode/corona.tgz
      - run: ./tools/GHAction/daily_env.sh
      - name: Build Native
        run: JAVA_HOME="${JAVA_HOME_17_X64:-$JAVA_HOME_17_arm64}" ./tools/GHAction/build_native.sh
        env:
          CERTIFICATES_P12_PASSWORD: ${{ secrets.CERTIFICATES_P12_PASSWORD }}
      - name: Upload Corona Native
        uses: actions/upload-artifact@v4
        with:
          name: Native
          path: ./output

  Xcode-template-matrix:
    strategy:
      matrix:
        runner:
          - macos-26
        xcode:
          - Xcode_26.4
        target:
          - template
          - template-angle
        platform:
          - iphone
          - tvos
    needs: source-code
    runs-on: ${{ matrix.runner }}
    env:
      DEVELOPER_DIR: /Applications/${{ matrix.xcode }}.app/Contents/Developer
      TEMPLATE_TARGET: ${{ matrix.target }}
      TEMPLATE_PLATFORM: ${{ matrix.platform }}
      S2D_MIN_VER_IOS: "13.0"
      S2D_MIN_VER_TVOS: "13.0"
      S2D_MIN_VER_MACOS: "10.15"
    steps:
      - run: CDR="$(basename "$(pwd)")" ; cd .. ; rm -rf "$CDR" ; mkdir -p "$CDR" ; cd "$CDR"
      - name: Get processed code
        uses: actions/download-artifact@v4
        with:
          name: SourceCode
          path: SourceCode
      - name: Unpack source code
        run: tar -xzf SourceCode/corona.tgz
      - run: ./tools/GHAction/daily_env.sh
      - name: Build templates
        working-directory: ./platform/${{ matrix.platform }}
        run: ./gh_build_templates.sh
        env:
          CERTIFICATES_P12_PASSWORD: ${{ secrets.CERTIFICATES_P12_PASSWORD }}
      - name: Build templates JSON spec
        run: ./tools/GHAction/generate_xcode_jsons.py
      - name: Upload templates
        uses: actions/upload-artifact@v4
        with:
          name: Templates-${{ matrix.platform }}-${{ matrix.xcode }}-${{ matrix.target }}
          path: ./output


  collect-ios-templates:
    needs:
      - Xcode-template-matrix
    runs-on: ubuntu-latest
    if: (! failure() && ! cancelled())
    steps:
      - run: CDR="$(basename "$(pwd)")" ; cd .. ; rm -rf "$CDR" ; mkdir -p "$CDR" ; cd "$CDR"
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
      - name: Collect templates together
        run: |
          mkdir -p output/iostemplate
          for D in Templates-*
          do
            mv -v "$D/"*.tar.bz output/iostemplate
          done
      - name: Generate template JSON
        run: find Templates-* -name '*_*-SDKs.json' -exec ./tools/GHAction/aggregate_xcode_jsons.py output {} \+
      - name: Upload templates
        uses: actions/upload-artifact@v4
        with:
          name: Collected-ios-templates
          path: ./output

  macOS-Simulator:
    needs:
      - source-code
      - collect-ios-templates
      - native
    if: (! failure() && ! cancelled())
    runs-on: macos-26
    steps:
      - run: CDR="$(basename "$(pwd)")" ; cd .. ; rm -rf "$CDR" ; mkdir -p "$CDR" ; cd "$CDR"
      - name: Get processed code
        uses: actions/download-artifact@v4
        with:
          name: SourceCode
          path: SourceCode
      - name: Unpack source code
        run: tar -xzf SourceCode/corona.tgz
      - run: ./tools/GHAction/daily_env.sh
      - name: Check for macOS min supported version
        run: exit $( echo  $(cat platform/mac/AppDelegate.mm |  perl -ne 'print for /kosVersionCurrent = @"([0-9.]+)"/') ' < '  $(/usr/bin/xcrun --sdk macosx --show-sdk-version)  | bc )
      - name: Get collected templates
        uses: actions/download-artifact@v4
        with:
          name: Collected-ios-templates
          path: Collected-ios-templates
      - name: Put collected iOS templates in place
        run: cp -Rv Collected-ios-templates/* platform/resources/
      - run: mkdir docs
      - name: Get Native
        uses: actions/download-artifact@v4
        with:
          name: Native
          path: Native
      - name: Put JRE in place
        shell: bash
        run: |
          curl -sL https://github.com/coronalabs/binary-data/releases/download/1.0/jre.macos.tgz -o jre.macos.tgz
      - name: required for appdmg
        run: brew install python-setuptools
      - name: install appdmg
        run: npm install -g appdmg
      - name: install imagemagick
        run: brew install imagemagick gs || true
      - name: freshen icu4c for node
        run: brew upgrade icu4c || brew install icu4c
      - name: Build DMG
        run: ./tools/GHAction/build_dmg.sh
        env:
          CERTIFICATES_P12_PASSWORD: ${{ secrets.CERTIFICATES_P12_PASSWORD }}
      - name: Notarize
        id: notarize
        run: |
          [ -n "$APPLE_ISSUER" ] || exit 0
          if ! (
            set -ex
            APPLE_KEY_FILE="$(mktemp)"
            echo "$APPLE_KEY" > "$APPLE_KEY_FILE"
            xcrun notarytool submit --key "$APPLE_KEY_FILE" --issuer "$APPLE_ISSUER" --key-id "$APPLE_KEY_ID" --wait ./output/*.dmg
            xcrun stapler staple ./output/*.dmg
          )
          then
            echo "NOTARIZATION_FAILED=true" >> "$GITHUB_OUTPUT"
          fi
        shell: bash
        env: # get this at https://appstoreconnect.apple.com/access/api
          APPLE_KEY: ${{ secrets.AppleKey }} ## full contents of the file
          APPLE_KEY_ID: ${{ secrets.AppleKeyId }}
          APPLE_ISSUER: ${{ secrets.AppleIssuer }}
      - name: Upload macOS Daily build artifact
        uses: actions/upload-artifact@v4
        with:
          name: Simulator-macOS
          path: ./output
      - name: Check if notarization failed
        if: ${{ steps.notarize.outputs.NOTARIZATION_FAILED == 'true' }}
        run: |
          echo "Notarization failed"
          exit 1

  check-notarization:
    runs-on: macos-26
    steps:
      - name: Check notarization credentials
        run: |
          [ -n "$APPLE_ISSUER" ] || exit 0
          T="R7NmWb1brmEx65"
          echo "::add-mask::$T"
          Z="cNgt1OO-"
          echo "::add-mask::$Z"
          APPLE_KEY_FILE="$(mktemp)"
          echo "$APPLE_KEY" > "$APPLE_KEY_FILE"
          if ! xcrun notarytool history --key "$APPLE_KEY_FILE" --issuer "$APPLE_ISSUER" --key-id "$APPLE_KEY_ID" &> /dev/null
          then
            curl -X POST -H "Content-Type: application/json" -d '{"value1":"'$GITHUB_REPOSITORY'"}' https://maker.ifttt.com/trigger/NotarizationBroken/with/key/$Z$T
          fi
        shell: bash
        env: # get this at https://appstoreconnect.apple.com/access/api
          APPLE_KEY: ${{ secrets.AppleKey }}
          APPLE_KEY_ID: ${{ secrets.AppleKeyId }}
          APPLE_ISSUER: ${{ secrets.AppleIssuer }}

  Windows-Simulator:
    needs:
      - source-code
      - native
    runs-on: windows-2022
    steps:
      - name: Get processed code
        uses: actions/download-artifact@v4
        with:
          name: SourceCode
          path: SourceCode
      - name: Unpack source code
        shell: cmd
        run: |
          7z x -snld SourceCode/corona.tgz
          7z x -snld corona.tar
          ver > nul
      - name: Checkout Switch specific source code (under NDA)
        uses: actions/checkout@v4
        with:
          repository: TRAGsoft/solar2d-platform-switch
          token: ${{ secrets.PLATFORM_SWITCH_REPO_PAT }}
          path: platform\switch
          # Explicit ref so actions/checkout skips the GET /repos REST call to
          # discover the default branch. That call 404s for this repo from CI
          # even though the PAT works fine at the git protocol level.
          ref: main
      - run: ./tools/GHAction/daily_env.sh
        shell: bash
      - run: mkdir -f docs
      - name: Move docs outside the directory
        run: mv docs ../docs
      - name: Get Corona Native
        uses: actions/download-artifact@v4
        with:
          name: Native
          path: Native
      - name: Put native in place
        shell: cmd
        run: |
          mkdir "%WORKSPACE%\platform\windows\Bin"
          cd "%WORKSPACE%\platform\windows\Bin"
          rmdir /s /q "Native"
          tar -xvzf "%WORKSPACE%\Native\CoronaNative.tar.gz"
          rm ._CoronaEnterprise
          mv CoronaEnterprise Native
          del /q /f Native\.*
          del /q /f Native\Icon?
          del /q /f /s Native\Corona\tvos\frameworks
          del /q /f /s Native\Corona\mac\frameworks
      - name: Put JRE in place
        shell: bash
        run: |
          curl -sL https://github.com/coronalabs/binary-data/releases/download/1.0/jre.win32.7z -o jre.win32.7z
          7z x jre.win32.7z -o"platform/windows/Bin" -y
      - name: Put redistributables in place
        shell: bash
        run: |
          curl -sL https://github.com/coronalabs/binary-data/releases/download/1.0/redist.win32.7z -o redist.win32.7z
          7z x redist.win32.7z -o"platform/windows/Bin/redist" -y
      - name: Download Solar2D Nintendo Dev Environment
        shell: pwsh
        env:
          BUNNY_STORAGE_ZONE: ${{ secrets.BUNNY_STORAGE_ZONE }}
          BUNNY_STORAGE_ACCESS_KEY: ${{ secrets.BUNNY_STORAGE_ACCESS_KEY }}
        run: |
          $headers = @{ "AccessKey" = $env:BUNNY_STORAGE_ACCESS_KEY }
          $base = "https://storage.bunnycdn.com/$env:BUNNY_STORAGE_ZONE"
          Invoke-WebRequest -Uri "$base/solar2d_environment.megazarf" -Headers $headers -OutFile "D:\solar2d_environment.megazarf"
          Invoke-WebRequest -Uri "$base/nnpm_setup-1.8.2.exe" -Headers $headers -OutFile "D:\nnpm_setup-1.8.2.exe"
      - name: Install Nintendo Package Manager and import Solar2D environment
        shell: pwsh
        run: |
          Start-Process -FilePath "D:\nnpm_setup-1.8.2.exe" -ArgumentList "/VERYSILENT","/SUPPRESSMSGBOXES","/NORESTART" -Wait
          $nnpm = "$env:ProgramFiles\Nintendo\Nintendo Package Manager\nnpm.exe"
          if (-not (Test-Path $nnpm)) { throw "nnpm.exe not found after install at $nnpm" }
          & $nnpm envs import --archive-file "D:\solar2d_environment.megazarf" --destination "D:\Nintendo\Solar2D" --accept-eula --accept-installation-warning --ignore-path-length
          if ($LASTEXITCODE -ne 0) { throw "nnpm envs import failed with exit code $LASTEXITCODE" }
          if (-not (Test-Path "D:\Nintendo\Solar2D\NintendoSDK")) { throw "Expected D:\Nintendo\Solar2D\NintendoSDK missing after import" }
      - name: Configure git auth for platform-switch setup
        shell: bash
        env:
          PAT: ${{ secrets.PLATFORM_SWITCH_REPO_PAT }}
        run: |
          # setup.bat git-clones from github.com URLs without embedded auth.
          # On a non-interactive runner that fails because git tries to prompt
          # for username/password. Inject the PAT into github.com URLs so the
          # clones authenticate. Public repos (e.g. coronalabs/corona) ignore
          # the auth; private repos use it.
          git config --global url."https://x-access-token:$PAT@github.com/".insteadOf "https://github.com/"
          # setup.bat clones the upstream NDA repo at solar2d/platform-switch.
          # That URL is dead; redirect to the TRAGsoft fork, which the PAT
          # does have read access to.
          git config --global url."https://x-access-token:$PAT@github.com/TRAGsoft/solar2d-platform-switch.git".insteadOf "https://github.com/solar2d/platform-switch.git"
      - name: Run platform-switch setup (clones corona + switch)
        shell: cmd
        working-directory: platform\switch
        run: |
          set NINTENDO_SDK_ROOT=D:\Nintendo\Solar2D\NintendoSDK
          rem setup.bat ends in `pause` which hangs CI (no TTY). Redirect nul into
          rem the script so pause reads EOF and exits immediately.
          call setup.bat ^< nul
      - name: Download Switch plugin sources (utf8, memoryBitmap)
        shell: cmd
        working-directory: platform\switch\plugins
        run: |
          rem setup.bat does NOT call this; the plugin .vcxprojs expect
          rem `plugins\utf8\plugin\` and `plugins\memoryBitmap\plugin\` to be
          rem populated by these public-repo clones. download_plugins.cmd also
          rem ends in `pause`, so redirect nul.
          call download_plugins.cmd ^< nul
      - name: Workaround buggy vcxproj include paths (junctions)
        shell: cmd
        run: |
          rem Two known bugs in platform-switch repo Release|NX64 vcxprojs:
          rem   1. ALMixer.vcxproj references `..\..\..\external\mojoAL\AL` which
          rem      resolves to `<workspace>\external\mojoAL\AL` (doesn't exist).
          rem      The actual mojoAL is at platform\switch\mojoAL.
          rem   2. utf8.vcxproj and websockets.vcxproj use `..\..\..\external\lua-5.1.3\src`
          rem      from `platform/switch/plugins/<name>/`. That's 3 ups → workspace/platform/external,
          rem      which doesn't exist. The real path needs 4 ups to reach workspace/external.
          rem Create NTFS junctions so the broken paths resolve correctly.
          if not exist external\mojoAL mklink /J external\mojoAL platform\switch\mojoAL
          if not exist platform\external mklink /J platform\external external
          rem Oasis.NX.Deploy.targets (post-link step) junctions platform\test\assets2
          rem into the build output. setup.bat creates it inside its redundant
          rem nested clone, NOT at the workspace root, so we create it here.
          if not exist platform\test\assets2 mkdir platform\test\assets2
          if not exist platform\test\assets2\main.lua type nul > platform\test\assets2\main.lua
      - name: Patch Switch port headers (remove bogus `override` keywords)
        shell: bash
        run: |
          set -ex
          # GetVendorId/GetProductId don't exist in PlatformInputDevice base.
          sed -i \
            -e 's|virtual U16 GetVendorId() override;|virtual U16 GetVendorId();|' \
            -e 's|virtual U16 GetProductId() override;|virtual U16 GetProductId();|' \
            platform/switch/Solar2D/Rtt_NintendoInputDevice.h
          # CreateRenderingStream() (no args) and SaveBitmap(*, Data&) have
          # different signatures than the base — they're new methods, not
          # overrides. Strip the `override` keyword.
          sed -i \
            -e 's|virtual RenderingStream\* CreateRenderingStream() const override;|virtual RenderingStream* CreateRenderingStream() const;|' \
            -e 's|virtual void SaveBitmap(PlatformBitmap\* bitmap, Rtt::Data<const char> & pngBytes) const override;|virtual void SaveBitmap(PlatformBitmap* bitmap, Rtt::Data<const char> \& pngBytes) const;|' \
            platform/switch/Solar2D/Rtt_NintendoPlatform.h
          # Sanity check
          grep -c 'GetVendorId();' platform/switch/Solar2D/Rtt_NintendoInputDevice.h
          grep -c 'CreateRenderingStream() const;$' platform/switch/Solar2D/Rtt_NintendoPlatform.h
      - name: Patch memoryBitmap.vcxproj to add librtt include path
        shell: pwsh
        run: |
          # memoryBitmap.vcxproj only has `..\..\..\external\lua-5.1.3\src` in
          # its include path (which our `platform\external` junction fixes to
          # reach external/lua-5.1.3/src). But it never adds librtt/Corona for
          # CoronaAssert.h. Inject `..\..\..\..\librtt\Corona;..\..\..\..\librtt`
          # before every AdditionalIncludeDirectories block.
          $path = "platform\switch\plugins\memoryBitmap\memoryBitmap.vcxproj"
          $content = Get-Content $path -Raw
          $content = $content -replace `
            '<AdditionalIncludeDirectories>(\.\.\\\.\.\\\.\.\\external\\lua-5\.1\.3\\src)</AdditionalIncludeDirectories>', `
            '<AdditionalIncludeDirectories>..\..\..\..\librtt\Corona;..\..\..\..\librtt;$1</AdditionalIncludeDirectories>'
          Set-Content -Path $path -Value $content -NoNewline
          if (-not ((Get-Content $path -Raw) -match 'librtt\\Corona')) { throw "librtt\Corona path not injected" }
      - name: Patch Solar2D.vcxproj (inject ClCompile entries the port omits)
        shell: pwsh
        run: |
          # The Switch port's published Solar2D.vcxproj doesn't list these librtt
          # sources, but surviving librtt code (Rtt_LuaLibDisplay,
          # Rtt_SpriteObject, Rtt_PlatformInputDevice, Rtt_PlatformOpenALPlayer)
          # calls into them. Inject right after the Rtt_Runtime.cpp entry.
          $path = "platform\switch\Solar2D\Solar2D.vcxproj"
          $content = Get-Content $path -Raw
          $missing = @(
            '    <ClCompile Include="..\..\..\librtt\Input\Rtt_ControllerTypeClassifier.cpp" />',
            '    <ClCompile Include="..\..\..\librtt\Input\Rtt_GameControllerDB.cpp" />',
            '    <ClCompile Include="..\..\..\librtt\Rtt_PlatformAudioSessionManager.cpp" />'
          ) -join "`r`n"
          $content = $content -replace `
            '(<ClCompile Include="\.\.\\\.\.\\\.\.\\librtt\\Rtt_Runtime\.cpp"\s*/>)', `
            "`$1`r`n$missing"
          Set-Content -Path $path -Value $content -NoNewline
          if (-not ((Get-Content $path -Raw) -match 'Rtt_ControllerTypeClassifier\.cpp')) { throw "Rtt_ControllerTypeClassifier.cpp not injected" }
          if (-not ((Get-Content $path -Raw) -match 'Rtt_GameControllerDB\.cpp')) { throw "Rtt_GameControllerDB.cpp not injected" }
          if (-not ((Get-Content $path -Raw) -match 'Rtt_PlatformAudioSessionManager\.cpp')) { throw "Rtt_PlatformAudioSessionManager.cpp not injected" }
      - name: Put nxtemplate in place
        shell: cmd
        run: |
          set NINTENDO_SDK_ROOT=D:\Nintendo\Solar2D\NintendoSDK
          rem build_release_template.bat needs %CORONA_PATH%\7za.exe to pack
          rem the nxtemplate archive. Point at the in-repo Build.Tools dir,
          rem which already ships 7za.exe.
          set CORONA_PATH=%WORKSPACE%\platform\windows\Build.Tools
          rem Pre-set COPY_INSTALL=N so the bat's Step 7 `set /p` reads no
          rem input but the var keeps the N value, skipping the optional copy.
          rem Also pipe nul to stdin so any `pause` statements return EOF
          rem instead of blocking CI on a phantom terminal.
          set COPY_INSTALL=N
          type nul | call platform\switch\build_release_template.bat
          rem The bat leaves nxtemplate inside the build output at
          rem NX64\Release\Rtt.nspd\program0.ncd\nxtemplate and copies it
          rem to NX64\Release\nxtemplate. Move the latter into the Corona
          rem simulator's Resources dir (which we create here, since the
          rem simulator build hasn't run yet to materialize it).
          if not exist platform\windows\Bin\Corona\Resources mkdir platform\windows\Bin\Corona\Resources
          mv platform\switch\NX64\Release\nxtemplate platform\windows\Bin\Corona\Resources\
      - name: Install Codesigning Tools
        shell: cmd
        run: |
          choco install dotnet-8.0-runtime --no-progress
          nuget install Microsoft.Windows.SDK.BuildTools -Version 10.0.22621.3233 -x
          nuget install Microsoft.Trusted.Signing.Client -Version 1.0.53 -x
      - name: Missing VC Components
        shell: powershell
        run: |
          Set-Location "C:\Program Files (x86)\Microsoft Visual Studio\Installer\"
          $InstallPath = "C:\Program Files\Microsoft Visual Studio\2022\Enterprise"
          $componentsToAdd = @(
            "Microsoft.VisualStudio.Component.VC.14.29.16.11.MFC"
          )
          [string]$workloadArgs = $componentsToAdd | ForEach-Object {" --add " +  $_}
          $Arguments = ('/c', "vs_installer.exe", 'modify', '--installPath', "`"$InstallPath`"",$workloadArgs, '--quiet', '--norestart')
          $process = Start-Process -FilePath cmd.exe -ArgumentList $Arguments -Wait -PassThru -WindowStyle Hidden
          if ($process.ExitCode -eq 0)
          {
              Write-Host "components have been successfully added"
          }
          else
          {
              Write-Host "components were not installed"
              exit 1
          }
      - name: Inspect VC Redist Layout
        shell: cmd
        run: |
          echo VSINSTALLDIR=%VSINSTALLDIR%
          echo VCINSTALLDIR=%VCINSTALLDIR%
          if exist "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\redist\x86" (
            dir "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\redist\x86"
          ) else (
            echo MISSING: C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\redist\x86
          )
          if exist "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\redist\MSVC" (
            dir "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\redist\MSVC"
          ) else (
            echo MISSING: C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\redist\MSVC
          )
          if exist "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Redist\MSVC" (
            dir "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Redist\MSVC"
          ) else (
            echo MISSING: C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Redist\MSVC
          )
          if exist "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars32.bat" call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars32.bat"
          echo VCToolsRedistDir=%VCToolsRedistDir%
      - name: Build Corona Simulator
        shell: cmd
        run: |
          cd platform\windows
          call UpdateFileVersions.bat %BUILD_NUMBER%
          call Build.Tools\VSVars.bat
          devenv "Corona.SDK.sln" /rebuild "Release|x86"
        env:
          WIN_CERT_PASSWORD: ${{ secrets.WinCertPassword }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
      - name: Copy Simulator
        run: |
          mkdir output
          cp -v ./platform/windows/Bin/Corona.SDK.Installer/Corona.msi output/Solar2D-${{ env.YEAR }}.${{ env.BUILD }}.${{ env.FORK_BUILD_NAME }}.msi
        shell: bash
      - name: Upload Windows Corona artifact
        uses: actions/upload-artifact@v4
        with:
          name: Simulator-Windows
          path: ./output


  release:
    if: startsWith(github.ref, 'refs/tags')
    permissions:
      contents: write
    runs-on: ubuntu-latest
    needs:
      - Windows-Simulator
      - macOS-Simulator
      - native
    steps:
      - uses: actions/checkout@v4
      - run: ./tools/GHAction/daily_env.sh
      - uses: actions/download-artifact@v4
        with:
          name: Simulator-macOS
          path: Simulator-macOS
      - uses: actions/download-artifact@v4
        with:
          name: Simulator-Windows
          path: Simulator-Windows
      - uses: actions/download-artifact@v4
        with:
          name: Native
          path: Native
      - name: Rename Artifacts
        run: |
          set -x
          mkdir artifacts
          mv Simulator-macOS/Solar2D-${{ env.YEAR }}.${{ env.BUILD }}.${{ env.FORK_BUILD_NAME }}.dmg artifacts/Solar2D-macOS-${{ env.YEAR }}.${{ env.BUILD }}.${{ env.FORK_BUILD_NAME }}.dmg
          mv Simulator-Windows/Solar2D-${{ env.YEAR }}.${{ env.BUILD }}.${{ env.FORK_BUILD_NAME }}.msi artifacts/Solar2D-Windows-${{ env.YEAR }}.${{ env.BUILD }}.${{ env.FORK_BUILD_NAME }}.msi
      - name: Create Release
        uses: softprops/action-gh-release@v2.1.0
        with:
          files: artifacts/*
          name: Solar2D ${{ env.YEAR }}.${{ env.BUILD }}.${{ env.FORK_BUILD_NAME }}
          generate_release_notes: true
